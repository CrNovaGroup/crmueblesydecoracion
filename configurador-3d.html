<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CR Design IA — Diseño de Muebles a Medida</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0B09;--sf:#131210;--sf2:#1A1915;--sf3:#22201A;
  --bd:#2C2920;--bd2:#3A3628;--gold:#C8A870;--gold-l:#E0C898;
  --gold-d:#8C6830;--cream:#F0EAD8;--muted:#6A6558;--tx:#E8E0CC;
  --green:#25D366;--r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

header{height:54px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:10}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--cream);text-decoration:none}
.logo em{color:var(--gold);font-style:normal}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:1px}
.hright{display:flex;align-items:center;gap:9px}
.badge-live{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border:1px solid rgba(200,168,112,0.4);border-radius:20px;color:var(--gold);display:flex;align-items:center;gap:5px}
.pulse{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.web-link{font-size:9px;color:var(--muted);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--bd);padding:4px 11px;border-radius:20px;transition:all .15s}
.web-link:hover{color:var(--gold);border-color:var(--gold)}

.layout{display:flex;height:calc(100vh - 54px)}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--bd)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}

.msg{display:flex;gap:10px;animation:fadeUp .3s ease}
.msg.ai{align-self:flex-start;max-width:92%}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:80%}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.ai .av{background:linear-gradient(135deg,#C8A870,#8C6830)}
.msg.user .av{background:var(--sf3);border:1px solid var(--bd2);font-size:11px}
.mbody{flex:1;min-width:0}
.mname{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.msg.ai .mname{color:var(--gold)}
.mbubble{padding:11px 14px;border-radius:var(--r);font-size:13px;line-height:1.65}
.msg.ai .mbubble{background:var(--sf2);border:1px solid var(--bd);border-radius:2px 10px 10px 10px;color:var(--cream)}
.msg.user .mbubble{background:var(--gold-d);border-radius:10px 2px 10px 10px;color:var(--cream)}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.chip{padding:6px 14px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--sf3);border:1px solid var(--bd2);border-radius:20px;color:var(--tx);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,168,112,0.08)}
.chip:disabled{opacity:.4;cursor:not-allowed}
.chip.sel{background:rgba(200,168,112,0.15);border-color:var(--gold);color:var(--gold-l)}

.dim-form{background:var(--sf3);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-top:10px}
.dim-title{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:11px}
.dim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.dim-field label{display:block;font-size:9px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.dim-input{width:100%;padding:7px 9px;background:var(--sf);border:1px solid var(--bd2);border-radius:4px;color:var(--cream);font-size:13px;font-family:'DM Mono',monospace;outline:none;transition:border-color .15s}
.dim-input:focus{border-color:var(--gold)}
.dim-unit{font-size:9px;color:var(--muted);margin-top:2px}
.dim-btn{width:100%;padding:9px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;background:var(--gold-d);color:var(--cream);border:none;border-radius:4px;cursor:pointer;transition:all .15s}
.dim-btn:hover{background:var(--gold);color:var(--bg)}
.dim-btn:disabled{opacity:.4;cursor:not-allowed}

/* DESIGN RESULT CARD */
.design-card{background:linear-gradient(135deg,rgba(200,168,112,0.07),rgba(200,168,112,0.02));border:1px solid rgba(200,168,112,0.25);border-radius:10px;padding:16px;margin-top:10px;animation:fadeUp .5s ease}
.design-card-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.design-canvas-wrap{background:var(--bg);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:12px}
.design-specs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.ds-item{background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:7px 9px}
.ds-k{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.ds-v{font-size:11px;color:var(--cream);font-weight:500}
.design-actions{display:flex;gap:7px}
.da-btn{flex:1;padding:9px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:all .15s}
.da-primary{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--bg)}
.da-primary:hover{filter:brightness(1.1)}
.da-secondary{background:var(--sf3);color:var(--tx);border:1px solid var(--bd2)}
.da-secondary:hover{border-color:var(--gold);color:var(--gold)}
.da-wa{background:#25D366;color:#fff}
.da-wa:hover{background:#1ebe5d}

/* typing */
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:typing 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

.chat-input-area{border-top:1px solid var(--bd);padding:12px 15px;display:flex;gap:9px;align-items:flex-end;background:var(--sf)}
.chat-ta{flex:1;min-height:40px;max-height:110px;padding:9px 13px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color .15s}
.chat-ta:focus{border-color:var(--gold)}
.chat-ta::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;background:var(--gold-d);border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:15px;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--gold);color:var(--bg)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.upload-btn{width:40px;height:40px;background:var(--sf3);border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;transition:all .15s;flex-shrink:0}
.upload-btn:hover{border-color:var(--gold);color:var(--gold)}
#fi{display:none}

/* RIGHT PANEL */
.rpanel{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sf)}
@media(max-width:780px){.rpanel{display:none}}
.rp-tabs{display:flex;border-bottom:1px solid var(--bd)}
.rp-tab{flex:1;padding:11px 5px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.rp-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.rp-body{flex:1;overflow-y:auto;padding:14px}
.rp-bottom{padding:12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}

.sec-hd{font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;background:var(--gold);border-radius:50%;flex-shrink:0}
.info-r{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(44,41,32,.5);font-size:10px}
.info-r:last-child{border-bottom:none}
.ik{color:var(--muted)}.iv{font-weight:500;color:var(--cream);font-family:'DM Mono',monospace;font-size:9px}

.prog-bar{height:2px;background:var(--bd);border-radius:2px;margin-bottom:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width .5s ease}
.prog-lbl{font-size:9px;color:var(--muted);text-align:right;margin-bottom:12px}

table.dt{width:100%;border-collapse:collapse;font-size:9px}
table.dt th{padding:4px 5px;text-align:left;font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--bd)}
table.dt td{padding:4px 5px;border-bottom:1px solid rgba(44,41,32,.4);color:var(--tx);font-family:'DM Mono',monospace}
table.dt tr:hover td{background:rgba(200,168,112,.04)}
.pn{color:var(--gold);font-weight:500}

.hitem{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;margin-bottom:3px;font-size:10px}
.hq{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);background:rgba(200,168,112,.1);padding:2px 6px;border-radius:10px}

.send-proj-btn{width:100%;padding:12px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.send-proj-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.send-proj-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.wa-btn{width:100%;padding:10px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;background:#25D366;color:#fff;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.wa-btn:hover{background:#1ebe5d}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:12px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.mhd{background:var(--bg);padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mhd h2{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);font-weight:400}
.mhd h2 em{color:var(--gold);font-style:normal}
.mclose{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.mclose:hover{color:var(--cream)}
.mbdy{padding:20px}
.mf{margin-bottom:11px}
.mf label{display:block;font-size:8px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.mf input,.mf textarea{width:100%;padding:9px 11px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--cream);outline:none;transition:border-color .15s}
.mf input:focus,.mf textarea:focus{border-color:var(--gold)}
.mf textarea{resize:none}
.mact{display:flex;gap:7px;margin-top:14px}
.mact button{flex:1;padding:10px;font-size:11px;font-family:'DM Sans',sans-serif;border-radius:var(--r);cursor:pointer;font-weight:500}
.mcancel{background:transparent;border:1px solid var(--bd2);color:var(--muted)}
.msend{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--bg);border:none}
.msend:hover{filter:brightness(1.1)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--sf);border:1px solid var(--gold);color:var(--cream);padding:9px 18px;border-radius:var(--r);font-size:11px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-rp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:var(--muted);font-size:11px;gap:8px;text-align:center}
.empty-icon{font-size:28px;opacity:.25}
.img-preview{max-width:160px;border-radius:5px;margin-top:7px;border:1px solid var(--bd)}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><em>CR</em> Design Muebles</div>
    <div class="logo-sub">Asistente de Diseño IA</div>
  </div>
  <div class="hright">
    <div class="badge-live"><div class="pulse"></div>IA Activa</div>
    <a href="https://crdesignmuebles.github.io/crmueblesydecoracion/" target="_blank" class="web-link">← Web</a>
  </div>
</header>

<div class="layout">
  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-msgs" id="msgs"></div>
    <div class="chat-input-area">
      <label class="upload-btn" title="Imagen de referencia">📎<input type="file" id="fi" accept="image/*"></label>
      <textarea class="chat-ta" id="ta" placeholder="Escribe tu respuesta..." rows="1"></textarea>
      <button class="send-btn" id="sbtn" onclick="send()">➤</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="rpanel">
    <div class="rp-tabs">
      <div class="rp-tab active" onclick="rpTab('resumen',this)">Resumen</div>
      <div class="rp-tab" onclick="rpTab('despiece',this)">Despiece</div>
      <div class="rp-tab" onclick="rpTab('herrajes',this)">Herrajes</div>
    </div>
    <div class="rp-body" id="rpBody">
      <div class="empty-rp"><div class="empty-icon">📐</div><div>Tu proyecto aparecerá<br>aquí mientras conversas</div></div>
    </div>
    <div class="rp-bottom">
      <button class="send-proj-btn" id="spBtn" onclick="openModal()" disabled>✉ Enviar proyecto completo</button>
      <button class="wa-btn" onclick="sendWA()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Cotizar WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="ov">
  <div class="modal">
    <div class="mhd"><h2>Enviar a <em>CR Design</em></h2><button class="mclose" onclick="closeModal()">×</button></div>
    <div class="mbdy">
      <p style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6">Recibirás el presupuesto detallado en menos de 24 horas.</p>
      <div class="mf"><label>Nombre *</label><input type="text" id="cN" placeholder="Ej: María García"></div>
      <div class="mf"><label>Teléfono *</label><input type="tel" id="cP" placeholder="+57 300 000 0000"></div>
      <div class="mf"><label>Email</label><input type="email" id="cE" placeholder="tu@correo.com"></div>
      <div class="mf"><label>Ciudad</label><input type="text" id="cC" placeholder="Ej: Pereira"></div>
      <div class="mf"><label>Notas extra</label><textarea id="cX" rows="2" placeholder="Fecha ideal, detalles..."></textarea></div>
      <div class="mact"><button class="mcancel" onclick="closeModal()">Cancelar</button><button class="msend" onclick="doSend()">Enviar proyecto ✉</button></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Proyecto enviado</div>

<script>
// ══════════════════════════════════════
// STATE — el único objeto de verdad
// ══════════════════════════════════════
const P = {
  tipo:null, estilo:null, colores:null, acabado:null,
  puertas:null, cajones:null, herrajes:null,
  alto:null, ancho:null, fondo:null,
  distribucion:null, notas:null
};

// step: 0=tipo 1=estilo 2=colores 3=acabado 4=puertas 5=cajones
//       6=herrajes 7=medidas 8=distribucion 9=notas 10=done
let step = 0;
let busy = false;
let rpCurrent = 'resumen';

// ══════════════════════════════════════
// CHAT HELPERS
// ══════════════════════════════════════
const msgs = document.getElementById('msgs');

function scroll(){ msgs.scrollTop = msgs.scrollHeight; }

function addMsg(role, html, chips=[], hasDimForm=false){
  const w = document.createElement('div');
  w.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = role==='ai' ? '✦' : '👤';
  const body = document.createElement('div');
  body.className = 'mbody';
  const nm = document.createElement('div');
  nm.className = 'mname';
  nm.textContent = role==='ai' ? 'CR Design IA' : 'Tú';
  const bub = document.createElement('div');
  bub.className = 'mbubble';
  bub.innerHTML = html;

  if(hasDimForm) bub.appendChild(makeDimForm());

  body.appendChild(nm);
  body.appendChild(bub);

  if(chips.length){
    const row = document.createElement('div');
    row.className = 'chips';
    chips.forEach(c=>{
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = typeof c==='object' ? c.label : c;
      btn.onclick = ()=>{
        row.querySelectorAll('.chip').forEach(b=>{ b.disabled=true; b.classList.remove('sel'); });
        btn.classList.add('sel');
        onChip(typeof c==='object' ? c.id : c, btn.textContent);
      };
      row.appendChild(btn);
    });
    body.appendChild(row);
  }

  w.appendChild(av);
  w.appendChild(body);
  msgs.appendChild(w);
  scroll();
  return w;
}

function showTyping(){
  const w = document.createElement('div');
  w.className = 'msg ai'; w.id = 'typ';
  w.innerHTML = `<div class="av">✦</div><div class="mbody"><div class="mname" style="color:var(--gold)">CR Design IA</div><div class="mbubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(w); scroll();
}
function hideTyping(){ const t=document.getElementById('typ'); if(t) t.remove(); }

function ai(html, chips=[], dimForm=false, delay=900){
  busy=true;
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addMsg('ai', html, chips, dimForm);
    busy=false;
    rpRefresh();
  }, delay);
}

// ══════════════════════════════════════
// DIM FORM
// ══════════════════════════════════════
let dimFormActive = false;
function makeDimForm(){
  dimFormActive = true;
  const f = document.createElement('div');
  f.className = 'dim-form';
  f.innerHTML = `
    <div class="dim-title">📐 Medidas del espacio disponible</div>
    <div class="dim-grid">
      <div class="dim-field"><label>Alto</label><input class="dim-input" id="dA" type="number" placeholder="220" min="50" max="350"><div class="dim-unit">cm</div></div>
      <div class="dim-field"><label>Ancho</label><input class="dim-input" id="dW" type="number" placeholder="200" min="30" max="600"><div class="dim-unit">cm</div></div>
      <div class="dim-field"><label>Fondo</label><input class="dim-input" id="dD" type="number" placeholder="60" min="20" max="120"><div class="dim-unit">cm</div></div>
    </div>
    <button class="dim-btn" id="dimOk" onclick="confirmDim()">Confirmar medidas →</button>
  `;
  return f;
}

function confirmDim(){
  const a=parseFloat(document.getElementById('dA')?.value);
  const w=parseFloat(document.getElementById('dW')?.value);
  const d=parseFloat(document.getElementById('dD')?.value);
  if(!a||!w||!d||isNaN(a)||isNaN(w)||isNaN(d)){ alert('Por favor completa las tres medidas.'); return; }
  P.alto=a; P.ancho=w; P.fondo=d;
  document.querySelectorAll('.dim-btn').forEach(b=>b.disabled=true);
  dimFormActive=false;
  step=8;
  addMsg('user',`Medidas confirmadas: Alto ${a}cm × Ancho ${w}cm × Fondo ${d}cm`);
  rpRefresh();
  ai(
    'Perfecto, medidas registradas. ¿Cómo quieres organizar el interior?<br><small style="color:var(--muted)">Puedes elegir varias opciones</small>',
    ['Barra colgadora','Estantes fijos','Cajones','Zapatero','Espejo interior','LED interior','Pantalonero','Joyero'],
    false, 900
  );
}

function onChip(val, label){
  addMsg('user', label);

  if(step===0){
    P.tipo=val; step=1; rpRefresh();
    ai('Excelente. ¿Qué estilo deseas para tu '+label+'?',
      ['Moderno','Minimalista','Clásico','Industrial','Nórdico','Rústico'], false, 800);

  } else if(step===1){
    P.estilo=val; step=2; rpRefresh();
    ai('Estilo <strong>'+val+'</strong> anotado. ¿Qué combinación de colores prefieres?',
      ['Blanco + madera natural','Gris + negro','Madera oscura + negro','Blanco puro','Colores personalizados'], false, 800);

  } else if(step===2){
    P.colores=val; step=3; rpRefresh();
    ai('¿Qué tipo de acabado prefieres para las superficies?',
      ['Laminado mate','Laminado brillante','Madera natural','Lacado mate','Melamina'], false, 800);

  } else if(step===3){
    P.acabado=val; step=4; rpRefresh();
    ai('Acabado <strong>'+val+'</strong> registrado. ¿Qué tipo de puertas deseas?',
      ['Correderas','Abatibles','Sin puertas','Plegables'], false, 800);

  } else if(step===4){
    P.puertas=val; step=5; rpRefresh();
    ai('¿Cuántos cajones necesitas?',
      ['Sin cajones','2 cajones','4 cajones','6 cajones','Muchos cajones'], false, 800);

  } else if(step===5){
    P.cajones=val; step=6; rpRefresh();
    ai('¿Qué tipo de herrajes prefieres para tiradores y bisagras?',
      ['Dorado','Plateado','Negro mate','Cromo','Sin herrajes visibles'], false, 800);

  } else if(step===6){
    P.herrajes=val; step=7; rpRefresh();
    ai('Perfecto. Ahora necesito las <strong>medidas exactas</strong> del espacio disponible:', [], true, 900);

  } else if(step===8){
    // distribution chips — accumulate
    P.distribucion = P.distribucion ? P.distribucion+', '+label : label;
    rpRefresh();
    ai('Anotado: <strong>'+P.distribucion+'</strong>.<br>¿Quieres añadir algo más o terminamos la distribución?',
      ['✔ Listo, generar diseño','+ Más opciones'],
      false, 700);

  } else if(step===8 && (val==='listo'||label.includes('Listo')||label.includes('generar'))){
    step=9; rpRefresh();
    ai('¿Tienes alguna necesidad especial o imagen de referencia?<br><small style="color:var(--muted)">Escribe los detalles o responde "No" para continuar</small>', [], false, 800);
  }

  // Finish trigger
  if(label.includes('generar diseño') || label.includes('Listo')){
    step=9; rpRefresh();
    ai('¿Tienes alguna necesidad especial o imagen de referencia?<br><small style="color:var(--muted)">Escribe los detalles o responde "No" para continuar</small>', [], false, 800);
  }
}

// ══════════════════════════════════════
// FREE TEXT → FLOW
// ══════════════════════════════════════
function send(){
  const ta = document.getElementById('ta');
  const txt = ta.value.trim();
  if(!txt || busy) return;
  ta.value=''; ta.style.height='auto';
  addMsg('user', txt);

  const low = txt.toLowerCase();

  // Step 8: distribución en texto libre
  if(step===8){
    if(low.includes('list')||low.includes('ya')||low.includes('eso es')||low.includes('con eso')||low==='ok'||low==='si'||low==='sí'){
      if(!P.distribucion) P.distribucion='Distribución estándar';
      step=9; rpRefresh();
      ai('¿Tienes alguna necesidad especial o imagen de referencia?<br><small style="color:var(--muted)">Escribe los detalles o responde "No" para continuar</small>', [], false, 800);
    } else {
      P.distribucion = P.distribucion ? P.distribucion+', '+txt : txt;
      rpRefresh();
      ai('Anotado: <strong>'+P.distribucion+'</strong>. ¿Algo más o terminamos?',
        ['✔ Listo, generar diseño'], false, 700);
    }
    return;
  }

  // Step 9: notas finales → SIEMPRE genera el diseño
  if(step===9){
    P.notas = (low==='no'||low==='nada'||low==='ninguna') ? null : txt;
    step=10; rpRefresh();
    finishFlow();
    return;
  }

  // Fuera de flujo: respuesta genérica útil
  const replies = [
    'Entendido. Cuando quieras continuar con el diseño, sigue el proceso paso a paso.',
    'Anotado. Recuerda que puedes ajustar cualquier detalle antes de enviar el proyecto.',
    'Muy bien. ¿Hay algún otro detalle que quieras que tenga en cuenta para el diseño?'
  ];
  ai(replies[Math.floor(Math.random()*replies.length)], [], false, 700);
}

// ══════════════════════════════════════
// CANVAS RENDER — visual 2D design
// ══════════════════════════════════════
function getBodyColor(){
  const c = (P.colores||'').toLowerCase();
  if(c.includes('negro')||c.includes('dark')) return '#1A1814';
  if(c.includes('gris')) return '#888888';
  if(c.includes('madera oscura')) return '#6B4C2A';
  if(c.includes('madera natural')||c.includes('natural')) return '#C4A882';
  return '#F0EAD8'; // blanco default
}

function drawDesign(){
  const canvas = document.getElementById('designCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=600, H=280;
  ctx.clearRect(0,0,W,H);

  // Background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1A1814'); bg.addColorStop(1,'#0C0B09');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Floor shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(40,H-20,W-80,20);

  const cols = P.ancho ? Math.max(1, Math.round(P.ancho/65)) : 3;
  const T15 = 4; // px for panel thickness
  const bodyColor = getBodyColor();
  const isDark = parseInt(bodyColor.replace('#','').slice(0,2),16)*0.3 +
                 parseInt(bodyColor.replace('#','').slice(2,4),16)*0.6 +
                 parseInt(bodyColor.replace('#','').slice(4,6),16)*0.1 < 140;

  // Wardrobe dimensions in px
  const cw = (W - 80) / cols;
  const ch = H - 40;
  const ox = 40, oy = 10;

  // Door color
  let doorFill = bodyColor;
  const fin = (P.acabado||'').toLowerCase();
  if(fin.includes('brillante')) doorFill = lighten(bodyColor, 30);
  if(P.puertas==='Espejo') doorFill = '#C8D8E8';

  for(let c=0; c<cols; c++){
    const x = ox + c*cw;

    // Column body
    const grad = ctx.createLinearGradient(x,oy,x+cw,oy);
    grad.addColorStop(0, lighten(bodyColor,15));
    grad.addColorStop(0.5, bodyColor);
    grad.addColorStop(1, darken(bodyColor,20));
    ctx.fillStyle = grad;
    ctx.fillRect(x, oy, cw, ch);

    // Inner area
    ctx.fillStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
    ctx.fillRect(x+T15, oy+T15, cw-2*T15, ch-2*T15);

    // Interior modules
    const innerH = ch - 2*T15;
    const innerX = x+T15, innerY = oy+T15, innerW = cw-2*T15;
    const rows = P.alto>210 ? 3 : 2;
    const sH = innerH/rows;

    // Shelves
    ctx.fillStyle = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
    for(let r=1; r<rows; r++){
      ctx.fillRect(innerX+2, innerY+r*sH-2, innerW-4, 4);
    }

    // Barra (if distribucion includes barra)
    if(P.distribucion?.toLowerCase().includes('barra')||!P.distribucion){
      ctx.strokeStyle = '#C4A46B';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(innerX+8, innerY + sH*0.55);
      ctx.lineTo(innerX+innerW-8, innerY + sH*0.55);
      ctx.stroke();
    }

    // Cajones (bottom section)
    if(P.cajones && P.cajones!=='Sin cajones'){
      const nC = P.cajones.includes('2')?2:P.cajones.includes('4')?4:P.cajones.includes('6')?6:3;
      const cajonH = (sH*0.88)/Math.min(nC,3);
      for(let i=0; i<Math.min(nC,3); i++){
        const cy = innerY + (rows-1)*sH + i*cajonH + 4;
        ctx.fillStyle = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
        ctx.fillRect(innerX+4, cy, innerW-8, cajonH-3);
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
        ctx.lineWidth=1; ctx.strokeRect(innerX+4, cy, innerW-8, cajonH-3);
        // Tirador cajón
        const hColor = P.herrajes==='Dorado'?'#C4A46B':P.herrajes==='Plateado'?'#A0A8B0':'#333';
        ctx.fillStyle=hColor;
        ctx.fillRect(innerX+innerW/2-12, cy+cajonH/2-2, 24, 4);
      }
    }

    // LED strip
    if(P.distribucion?.toLowerCase().includes('led')){
      ctx.fillStyle='rgba(255,235,160,0.7)';
      ctx.fillRect(innerX+2, oy+T15+2, innerW-4, 3);
    }

    // Border between columns
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.15)';
    ctx.lineWidth=1; ctx.strokeRect(x, oy, cw, ch);

    // PUERTAS
    if(P.puertas && P.puertas!=='Sin puertas'){
      const alpha = P.puertas==='Correderas'? 0.6 : 0.55;
      const doorGrad = ctx.createLinearGradient(x+T15,oy,x+cw-T15,oy);
      const dc = getBodyColor();
      doorGrad.addColorStop(0,'rgba(255,255,255,0.18)');
      doorGrad.addColorStop(0.5,`rgba(${hexToRgb(dc)},${alpha})`);
      doorGrad.addColorStop(1,'rgba(0,0,0,0.12)');
      ctx.fillStyle = doorGrad;
      ctx.fillRect(x+T15+1, oy+T15, cw-2*T15-2, ch-2*T15);

      // Door line for correderas
      if(P.puertas==='Correderas'){
        ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(x+cw/2, oy+T15); ctx.lineTo(x+cw/2, oy+ch-T15); ctx.stroke();
      }

      // Tirador puerta
      const hc = P.herrajes==='Dorado'?'#C4A46B':P.herrajes==='Plateado'?'#A0A8B0':'#222';
      ctx.fillStyle=hc;
      const hx = c%2===0 ? x+cw-T15-14 : x+T15+8;
      ctx.beginPath(); ctx.arc(hx, oy+ch/2, 4, 0, Math.PI*2); ctx.fill();
      // Tirador shadow
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath(); ctx.arc(hx+1, oy+ch/2+1, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle=hc;
      ctx.beginPath(); ctx.arc(hx, oy+ch/2, 4, 0, Math.PI*2); ctx.fill();
    }
  }

  // Zócalo
  ctx.fillStyle = darken(bodyColor,30);
  ctx.fillRect(ox, oy+ch, W-80, 10);

  // Tapeta/cornisa
  ctx.fillStyle = darken(bodyColor,15);
  ctx.fillRect(ox-4, oy-8, W-72, 10);

  // Dimension labels
  ctx.fillStyle='rgba(200,168,112,0.7)';
  ctx.font='11px DM Mono, monospace';
  ctx.textAlign='center';
  ctx.fillText(`← ${P.ancho||200} cm →`, W/2, H-2);
  ctx.textAlign='right';
  ctx.font='10px DM Mono, monospace';
  ctx.fillText(`${P.alto||220} cm`, ox-6, oy+ch/2);
}

function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
function darken(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amt); g=Math.max(0,g-amt); b=Math.max(0,b-amt);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ══════════════════════════════════════
// TECHNICAL CALCULATIONS
// ══════════════════════════════════════
function calcDespiece(){
  if(!P.alto||!P.ancho||!P.fondo) return null;
  const T=1.5, H=P.alto, W=P.ancho, D=P.fondo;
  const cols=Math.max(1,Math.round(W/65));
  const colW=(W-T*(cols+1))/cols;
  const pieces=[];
  pieces.push({nombre:'Lateral izquierdo',cant:1,ancho:D,largo:H,esp:'15mm',mat:'Aglomerado'});
  pieces.push({nombre:'Lateral derecho',cant:1,ancho:D,largo:H,esp:'15mm',mat:'Aglomerado'});
  pieces.push({nombre:'Techo',cant:1,ancho:D,largo:W-2*T,esp:'15mm',mat:'Aglomerado'});
  pieces.push({nombre:'Suelo',cant:1,ancho:D,largo:W-2*T,esp:'15mm',mat:'Aglomerado'});
  pieces.push({nombre:'Fondo/Espaldar',cant:1,ancho:H,largo:W,esp:'8mm',mat:'MDF'});
  if(cols>1) pieces.push({nombre:'División vertical',cant:cols-1,ancho:D-T,largo:H-2*T,esp:'15mm',mat:'Aglomerado'});
  const shPerCol=Math.floor((H-60)/35);
  pieces.push({nombre:'Estante interior',cant:cols*shPerCol,ancho:D-T,largo:colW,esp:'15mm',mat:'Aglomerado'});
  if(P.puertas && P.puertas!=='Sin puertas'){
    const dW=W/(cols*2), dH=H-1;
    pieces.push({nombre:'Puerta',cant:cols*2,ancho:dW,largo:dH,esp:'18mm',mat:'Aglomerado'});
  }
  const nC=P.cajones==='Sin cajones'?0:P.cajones?.includes('2')?2:P.cajones?.includes('4')?4:P.cajones?.includes('6')?6:3;
  if(nC>0){
    pieces.push({nombre:'Frente cajón',cant:nC,ancho:colW+2,largo:20,esp:'18mm',mat:'Aglomerado'});
    pieces.push({nombre:'Lateral cajón',cant:nC*2,ancho:D-5,largo:18,esp:'15mm',mat:'Aglomerado'});
    pieces.push({nombre:'Fondo cajón',cant:nC,ancho:colW-2,largo:D-5,esp:'8mm',mat:'MDF'});
  }
  return pieces;
}

function calcHerrajes(){
  if(!P.ancho||!P.alto) return [];
  const cols=Math.max(1,Math.round(P.ancho/65));
  const shPerCol=Math.floor((P.alto-60)/35);
  const nC=P.cajones==='Sin cajones'?0:P.cajones?.includes('2')?2:P.cajones?.includes('4')?4:P.cajones?.includes('6')?6:3;
  const nD=(P.puertas&&P.puertas!=='Sin puertas')?cols*2:0;
  const items=[];
  if(nD>0){
    if(P.puertas==='Correderas') items.push({nombre:'Kit correderas puerta',qty:`${Math.ceil(nD/2)} kit`});
    else items.push({nombre:`Bisagras ${P.herrajes||'estándar'}`,qty:`${nD*2} uds`});
    items.push({nombre:`Tirador ${P.herrajes||'dorado'}`,qty:`${nD} uds`});
    items.push({nombre:'Amortiguadores',qty:`${nD*2} uds`});
  }
  items.push({nombre:'Tornillos confirmat 7×50mm',qty:`${cols*16} uds`});
  items.push({nombre:'Tornillos 3.5×16mm',qty:`${cols*30} uds`});
  items.push({nombre:'Clavijas/tarugos',qty:`${cols*20} uds`});
  items.push({nombre:'Tapacanto ABS 1mm',qty:`${Math.ceil((P.alto+P.ancho)*4/100)} ml`});
  items.push({nombre:'Soportes estante regulables',qty:`${cols*shPerCol*4} uds`});
  if(nC>0){
    items.push({nombre:'Correderas telescópicas 45cm',qty:`${nC} pares`});
    items.push({nombre:`Tirador cajón ${P.herrajes||'dorado'}`,qty:`${nC} uds`});
  }
  if(P.distribucion?.toLowerCase().includes('barra'))
    items.push({nombre:'Barra colgar Ø25mm',qty:`${cols} × ${Math.round(P.ancho/cols-4)}cm`});
  if(P.distribucion?.toLowerCase().includes('led'))
    items.push({nombre:'Tira LED 12V cálida',qty:`${Math.ceil(P.ancho*3/100)} ml`});
  return items;
}

function calcTableros(){
  const pieces=calcDespiece(); if(!pieces) return null;
  let area=0;
  pieces.forEach(p=>{ if(p.esp!=='8mm') area+=p.ancho*p.largo*p.cant; });
  return {tableros:Math.ceil(area/(244*122)*1.12), area:Math.round(area)};
}

function rpTab(id, el){
  rpCurrent=id;
  document.querySelectorAll('.rp-tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  else document.querySelectorAll('.rp-tab').forEach((t,i)=>{ if(['resumen','despiece','herrajes'][i]===id) t.classList.add('active'); });
  rpRefresh();
}

function getProgress(){
  const keys=['tipo','estilo','colores','acabado','puertas','cajones','herrajes','alto','distribucion'];
  return Math.round(keys.filter(k=>P[k]!==null).length/keys.length*100);
}

function rpRefresh(){
  const body = document.getElementById('rpBody');
  const pieces=calcDespiece(), herrajes=calcHerrajes(), tableros=calcTableros();
  const prog=getProgress();

  if(rpCurrent==='resumen'){
    body.innerHTML=`
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
      <div class="prog-lbl">${prog}% completado</div>
      <div style="margin-bottom:16px">
        <div class="sec-hd"><div class="dot"></div>Diseño</div>
        ${row('Tipo',P.tipo)}${row('Estilo',P.estilo)}${row('Color',P.colores)}
        ${row('Acabado',P.acabado)}${row('Puertas',P.puertas)}${row('Cajones',P.cajones)}${row('Herrajes',P.herrajes)}
      </div>
      <div style="margin-bottom:16px">
        <div class="sec-hd"><div class="dot"></div>Medidas</div>
        ${row('Alto',P.alto?P.alto+' cm':null)}${row('Ancho',P.ancho?P.ancho+' cm':null)}
        ${row('Fondo',P.fondo?P.fondo+' cm':null)}
        ${row('Módulos',P.ancho?Math.max(1,Math.round(P.ancho/65))+' col.':null)}
      </div>
      ${tableros?`<div style="margin-bottom:16px"><div class="sec-hd"><div class="dot"></div>Material</div>
        ${row('Tableros 244×122',tableros.tableros+' uds')}${row('Área total',tableros.area+' cm²')}
        ${row('Material base','Aglomerado 15mm')}${row('Espaldar','MDF 8mm')}</div>`:''}
      ${P.distribucion?`<div><div class="sec-hd"><div class="dot"></div>Interior</div><div style="font-size:10px;color:var(--tx);line-height:1.7">${P.distribucion}</div></div>`:''}
    `;
  } else if(rpCurrent==='despiece'){
    if(!pieces){ body.innerHTML='<div class="empty-rp"><div class="empty-icon">📋</div><div>El despiece se genera al ingresar las medidas</div></div>'; return; }
    body.innerHTML=`
      <div style="font-size:8px;color:var(--muted);margin-bottom:10px;letter-spacing:0.08em;text-transform:uppercase">Material: Aglomerado 15mm + MDF 8mm espaldar</div>
      <table class="dt"><thead><tr><th>#</th><th>Pieza</th><th>A×L cm</th><th>Esp</th><th>Ud</th></tr></thead><tbody>
        ${pieces.map((p,i)=>`<tr><td class="pn">${i+1}</td><td>${p.nombre}</td><td style="font-size:8px">${p.ancho.toFixed(1)}×${p.largo.toFixed(1)}</td><td>${p.esp}</td><td>${p.cant}</td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:10px;padding:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;font-size:9px;color:var(--muted);line-height:1.7">
        <strong style="color:var(--gold)">Nota:</strong> Tolerancias de 1mm incluidas. Tapacanto en cantos visibles. Optimizar plano de corte para reducir desperdicio.
      </div>`;
  } else {
    if(!herrajes?.length){ body.innerHTML='<div class="empty-rp"><div class="empty-icon">🔩</div><div>Los herrajes se calculan al completar el diseño</div></div>'; return; }
    body.innerHTML=`
      <div style="font-size:8px;color:var(--muted);margin-bottom:10px;letter-spacing:0.08em;text-transform:uppercase">Herrajes para herraje ${P.herrajes||'estándar'}</div>
      ${herrajes.map(h=>`<div class="hitem"><span>${h.nombre}</span><span class="hq">${h.qty}</span></div>`).join('')}`;
  }
}

function row(k,v){
  return `<div class="info-r"><span class="ik">${k}</span><span class="iv">${v||'<span style="color:var(--muted)">—</span>'}</span></div>`;
}

// CONTACT

function openModal(){ document.getElementById('ov').classList.add('open'); }
function closeModal(){ document.getElementById('ov').classList.remove('open'); }

function buildBody(name,phone,email,city,extra){
  const pieces=calcDespiece(), herrajes=calcHerrajes(), tableros=calcTableros();
  const pt=pieces?pieces.map((p,i)=>`  ${i+1}. ${p.nombre}: ${p.ancho.toFixed(1)}×${p.largo.toFixed(1)}cm | ${p.esp} | ${p.cant}ud`).join('\n'):'Pendiente';
  const ht=herrajes?herrajes.map(h=>`  · ${h.nombre}: ${h.qty}`).join('\n'):'Pendiente';
  return `Hola CR Design Muebles,\n\nNuevo proyecto desde el Asistente IA.\n\n━━━━━━ CLIENTE ━━━━━━\nNombre: ${name}\nTeléfono: ${phone}\nEmail: ${email||'—'}\nCiudad: ${city||'—'}\n\n━━━━━━ DISEÑO ━━━━━━\nTipo: ${P.tipo||'—'}\nEstilo: ${P.estilo||'—'}\nColores: ${P.colores||'—'}\nAcabado: ${P.acabado||'—'}\nPuertas: ${P.puertas||'—'}\nCajones: ${P.cajones||'—'}\nHerrajes: ${P.herrajes||'—'}\n\n━━━━━━ MEDIDAS ━━━━━━\nAlto: ${P.alto||'—'} cm\nAncho: ${P.ancho||'—'} cm\nFondo: ${P.fondo||'—'} cm\nMódulos: ${P.ancho?Math.max(1,Math.round(P.ancho/65)):'—'}\nInterior: ${P.distribucion||'—'}\n\n━━━━━━ DESPIECE (15mm) ━━━━━━\n${pt}\n\nTableros 244×122cm: ${tableros?.tableros||'—'}\n\n━━━━━━ HERRAJES ━━━━━━\n${ht}\n\n━━━━━━ NOTAS ━━━━━━\n${P.notas||'—'}\n${extra?'Extra: '+extra:''}\n\nGracias,\n${name}`;
}

function doSend(){
  const n=document.getElementById('cN').value.trim();
  const p=document.getElementById('cP').value.trim();
  if(!n||!p){ alert('Nombre y teléfono son obligatorios.'); return; }
  const body=buildBody(n,p,document.getElementById('cE').value,document.getElementById('cC').value,document.getElementById('cX').value);
  window.location.href=`mailto:miguel_716@hotmail.com?subject=${encodeURIComponent('Proyecto CR Design IA — '+cap(P.tipo)+' — '+n)}&body=${encodeURIComponent(body)}`;
  closeModal();
  const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4000);
}

function sendWA(){
  const pieces=calcDespiece(), tableros=calcTableros();
  const txt=`Hola CR Design Muebles! Diseñé mi mueble en el asistente IA:\n\n📐 ${cap(P.tipo)||'Mueble'} estilo ${P.estilo||'—'}\n📏 ${P.ancho||'?'}×${P.alto||'?'}×${P.fondo||'?'} cm\n🚪 Puertas: ${P.puertas||'—'} (${P.acabado||'—'})\n🎨 Color: ${P.colores||'—'}\n📋 Piezas: ${pieces?.length||0} | Tableros: ${tableros?.tableros||'?'}\n📦 Interior: ${P.distribucion||'—'}\n\n¿Pueden enviarme un presupuesto?`;
  window.open(`https://wa.me/573146309609?text=${encodeURIComponent(txt)}`,'_blank');
}

const ta=document.getElementById('ta');
ta.addEventListener('input',()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,110)+'px'; });
ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });

document.getElementById('fi').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const w=document.createElement('div'); w.className='msg user';
    w.innerHTML=`<div class="av">👤</div><div class="mbody"><div class="mname">Tú</div><div class="mbubble">Imagen de referencia adjuntada<br><img src="${ev.target.result}" class="img-preview" alt="Ref"></div></div>`;
    msgs.appendChild(w); scroll();
    ai('¡Gracias por la imagen! La usaré como referencia de estilo y diseño. ¿Hay algún detalle específico que quieras replicar?', [], false, 900);
  };
  reader.readAsDataURL(file);
});

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
