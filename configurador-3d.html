<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CR Design IA — Diseño de Muebles a Medida</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0B09;
  --sf: #131210;
  --sf2: #1A1915;
  --sf3: #22201A;
  --bd: #2C2920;
  --bd2: #3A3628;
  --gold: #C8A870;
  --gold-l: #E0C898;
  --gold-d: #8C6830;
  --cream: #F0EAD8;
  --muted: #6A6558;
  --tx: #E8E0CC;
  --r: 6px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--tx); overflow: hidden; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }

/* ── HEADER ── */
header {
  height: 56px; background: var(--sf); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; flex-shrink: 0; position: relative; z-index: 10;
}
.logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--cream); letter-spacing: 0.04em; text-decoration: none; }
.logo em { color: var(--gold); font-style: normal; }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.hbadge { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border: 1px solid var(--bd2); border-radius: 20px; color: var(--muted); }
.hbadge.live { border-color: rgba(200,168,112,0.4); color: var(--gold); display: flex; align-items: center; gap: 5px; }
.pulse { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:0.3; transform:scale(1); } 50% { opacity:1; transform:scale(1.4); } }

/* ── LAYOUT ── */
.layout { display: flex; height: calc(100vh - 56px); }

/* ── CHAT PANEL ── */
.chat-panel {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  border-right: 1px solid var(--bd);
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
}

/* Messages */
.msg { display: flex; gap: 10px; max-width: 88%; animation: fadeUp 0.3s ease; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg.ai .msg-avatar { background: linear-gradient(135deg, #C8A870, #8C6830); }
.msg.user .msg-avatar { background: var(--sf3); border: 1px solid var(--bd2); }

.msg-body { flex: 1; min-width: 0; }
.msg-name { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.msg.ai .msg-name { color: var(--gold); }
.msg-bubble {
  padding: 12px 15px; border-radius: var(--r); font-size: 13px; line-height: 1.65;
}
.msg.ai .msg-bubble { background: var(--sf2); border: 1px solid var(--bd); border-radius: 2px 10px 10px 10px; color: var(--cream); }
.msg.user .msg-bubble { background: var(--gold-d); border-radius: 10px 2px 10px 10px; color: var(--cream); text-align: right; }

/* Options chips */
.options-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.opt-chip {
  padding: 6px 14px; font-size: 11px; font-family: 'DM Sans', sans-serif;
  background: var(--sf3); border: 1px solid var(--bd2); border-radius: 20px;
  color: var(--tx); cursor: pointer; transition: all 0.15s;
}
.opt-chip:hover { border-color: var(--gold); color: var(--gold); background: rgba(200,168,112,0.08); }
.opt-chip.selected { background: rgba(200,168,112,0.15); border-color: var(--gold); color: var(--gold-l); }

/* Dimension inputs inline */
.dim-form { background: var(--sf3); border: 1px solid var(--bd); border-radius: var(--r); padding: 14px; margin-top: 10px; }
.dim-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.dim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.dim-field label { display: block; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.dim-field input {
  width: 100%; padding: 7px 10px; background: var(--sf); border: 1px solid var(--bd2);
  border-radius: 4px; color: var(--cream); font-size: 13px; font-family: 'DM Mono', monospace;
  outline: none; transition: border-color 0.15s;
}
.dim-field input:focus { border-color: var(--gold); }
.dim-field .unit { font-size: 9px; color: var(--muted); margin-top: 2px; }
.dim-confirm { width: 100%; padding: 9px; font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; background: var(--gold-d); color: var(--cream); border: none; border-radius: 4px; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
.dim-confirm:hover { background: var(--gold); color: var(--bg); }

/* Typing indicator */
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 15px; }
.typing span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: typing 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,80%,100% { transform:scale(0.6); opacity:0.3; } 40% { transform:scale(1); opacity:1; } }

/* Chat input */
.chat-input-area {
  border-top: 1px solid var(--bd); padding: 14px 16px;
  display: flex; gap: 10px; align-items: flex-end; background: var(--sf);
}
.chat-textarea {
  flex: 1; min-height: 42px; max-height: 120px; padding: 10px 14px;
  background: var(--sf2); border: 1px solid var(--bd2); border-radius: var(--r);
  color: var(--cream); font-size: 13px; font-family: 'DM Sans', sans-serif;
  resize: none; outline: none; line-height: 1.5; transition: border-color 0.15s;
}
.chat-textarea:focus { border-color: var(--gold); }
.chat-textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 42px; height: 42px; background: var(--gold-d); border: none; border-radius: var(--r);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--cream); font-size: 16px; transition: all 0.15s; flex-shrink: 0;
}
.send-btn:hover { background: var(--gold); color: var(--bg); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Upload button */
.upload-btn {
  width: 42px; height: 42px; background: var(--sf3); border: 1px solid var(--bd2); border-radius: var(--r);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 16px; transition: all 0.15s; flex-shrink: 0;
}
.upload-btn:hover { border-color: var(--gold); color: var(--gold); }
#file-input { display: none; }

/* ── RIGHT PANEL ── */
.right-panel {
  width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--sf); overflow: hidden;
}
@media(max-width: 768px) { .right-panel { display: none; } }

.rp-tabs { display: flex; border-bottom: 1px solid var(--bd); }
.rp-tab { flex: 1; padding: 12px 6px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.rp-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.rp-content { flex: 1; overflow-y: auto; padding: 16px; }

/* Project summary */
.proj-section { margin-bottom: 20px; }
.proj-heading { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 6px; }
.proj-heading .dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }

.info-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(44,41,32,0.5); font-size: 11px; }
.info-row:last-child { border-bottom: none; }
.info-k { color: var(--muted); }
.info-v { font-weight: 500; color: var(--cream); font-family: 'DM Mono', monospace; font-size: 10px; }

/* Pieces table */
.pieces-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.pieces-table th { padding: 5px 6px; text-align: left; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--bd); }
.pieces-table td { padding: 5px 6px; border-bottom: 1px solid rgba(44,41,32,0.4); color: var(--tx); font-family: 'DM Mono', monospace; }
.pieces-table tr:hover td { background: rgba(200,168,112,0.04); }
.piece-num { color: var(--gold); font-weight: 500; }

/* Herrajes */
.herraje-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 9px; background: var(--sf2); border: 1px solid var(--bd); border-radius: 4px; margin-bottom: 4px; font-size: 11px; }
.herraje-name { color: var(--cream); }
.herraje-qty { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold); background: rgba(200,168,112,0.1); padding: 2px 7px; border-radius: 10px; }

/* CTA */
.send-project-btn {
  width: 100%; padding: 13px; font-size: 11px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold), var(--gold-d));
  color: var(--bg); border: none; border-radius: var(--r); cursor: pointer;
  margin-bottom: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.send-project-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,168,112,0.25); }
.send-project-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-wa-btn {
  width: 100%; padding: 11px; font-size: 11px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  background: #25D366; color: white; border: none; border-radius: var(--r); cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
}
.send-wa-btn:hover { background: #1ebe5d; }

/* Progress bar */
.progress-bar { height: 2px; background: var(--bd); border-radius: 2px; margin-bottom: 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold)); border-radius: 2px; transition: width 0.5s ease; }
.progress-label { font-size: 9px; color: var(--muted); text-align: right; margin-top: 3px; margin-bottom: 12px; }

/* Status badge */
.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
.status-badge.pending { background: rgba(200,168,112,0.1); color: var(--gold); border: 1px solid rgba(200,168,112,0.25); }
.status-badge.complete { background: rgba(62,207,142,0.1); color: #3ECF8E; border: 1px solid rgba(62,207,142,0.25); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--sf); border: 1px solid var(--bd2); border-radius: 12px; width: 100%; max-width: 440px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.7); }
.modal-head { background: var(--bg); padding: 18px 22px; border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; }
.modal-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--cream); }
.modal-head h2 em { color: var(--gold); font-style: normal; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; transition: color 0.15s; }
.modal-close:hover { color: var(--cream); }
.modal-body { padding: 22px; }
.m-field { margin-bottom: 13px; }
.m-field label { display: block; font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.m-field input, .m-field textarea { width: 100%; padding: 10px 13px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--sf2); border: 1px solid var(--bd2); border-radius: var(--r); color: var(--cream); outline: none; transition: border-color 0.15s; }
.m-field input:focus, .m-field textarea:focus { border-color: var(--gold); }
.m-field textarea { resize: none; }
.m-actions { display: flex; gap: 8px; margin-top: 16px; }
.m-cancel { flex: 1; padding: 11px; background: transparent; border: 1px solid var(--bd2); border-radius: var(--r); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
.m-send { flex: 2; padding: 11px; background: linear-gradient(135deg, var(--gold), var(--gold-d)); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; border: none; border-radius: var(--r); cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
.m-send:hover { filter: brightness(1.1); }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--sf); border: 1px solid var(--gold); color: var(--cream); padding: 10px 20px; border-radius: var(--r); font-size: 12px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Empty state */
.empty-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 12px; gap: 10px; }
.empty-icon { font-size: 32px; opacity: 0.3; }

/* Welcome screen inside chat */
.welcome-card { background: linear-gradient(135deg, rgba(200,168,112,0.08), rgba(200,168,112,0.02)); border: 1px solid rgba(200,168,112,0.2); border-radius: 10px; padding: 20px; margin-bottom: 8px; }
.welcome-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--cream); margin-bottom: 6px; }
.welcome-title em { color: var(--gold); font-style: normal; }
.welcome-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* Image preview */
.img-preview { max-width: 180px; border-radius: 6px; margin-top: 8px; border: 1px solid var(--bd); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><em>CR</em> Design Muebles</div>
    <div class="logo-sub">Asistente de Diseño IA</div>
  </div>
  <div class="header-right">
    <div class="hbadge live"><div class="pulse"></div>IA Activa</div>
    <a href="https://crdesignmuebles.github.io/crmueblesydecoracion/" target="_blank" style="font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--bd);padding:5px 12px;border-radius:20px">← Web</a>
  </div>
</header>

<div class="layout">

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <label class="upload-btn" title="Adjuntar imagen de referencia">
        📎
        <input type="file" id="file-input" accept="image/*">
      </label>
      <textarea class="chat-textarea" id="chatInput" placeholder="Escribe tu respuesta o pregunta..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendUserMessage()">➤</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="rp-tabs">
      <div class="rp-tab active" onclick="switchRpTab('resumen',this)">Resumen</div>
      <div class="rp-tab" onclick="switchRpTab('despiece',this)">Despiece</div>
      <div class="rp-tab" onclick="switchRpTab('herrajes',this)">Herrajes</div>
    </div>
    <div class="rp-content" id="rpContent">
      <div class="empty-panel">
        <div class="empty-icon">📐</div>
        <div>Tu proyecto aparecerá aquí<br>mientras conversas con la IA</div>
      </div>
    </div>
    <div style="padding:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:7px">
      <button class="send-project-btn" id="sendProjectBtn" onclick="openModal()" disabled>
        ✉ Enviar proyecto completo
      </button>
      <button class="send-wa-btn" onclick="sendWA()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Cotizar por WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Enviar a <em>CR Design</em></h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6">Recibirás una respuesta con el presupuesto detallado en menos de 24 horas.</p>
      <div class="m-field"><label>Nombre completo *</label><input type="text" id="cName" placeholder="Ej: María García"></div>
      <div class="m-field"><label>Teléfono *</label><input type="tel" id="cPhone" placeholder="+57 300 000 0000"></div>
      <div class="m-field"><label>Email</label><input type="email" id="cEmail" placeholder="tu@correo.com"></div>
      <div class="m-field"><label>Ciudad</label><input type="text" id="cCity" placeholder="Ej: Pereira"></div>
      <div class="m-field"><label>Notas adicionales</label><textarea id="cNotes" rows="2" placeholder="Fecha ideal, condiciones especiales..."></textarea></div>
      <div class="m-actions">
        <button class="m-cancel" onclick="closeModal()">Cancelar</button>
        <button class="m-send" onclick="sendEmail()">Enviar proyecto ✉</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Proyecto enviado correctamente</div>

<script>
// ══════════════════════════════════════════════════════
//  PROJECT STATE
// ══════════════════════════════════════════════════════
let project = {
  tipo: null, estilo: null, colores: null, acabado: null,
  puertas: null, cajones: null, herrajes: null,
  alto: null, ancho: null, fondo: null,
  distribucion: null, notas: null,
  step: 0, complete: false
};

let conversationHistory = [];
let isTyping = false;

// ══════════════════════════════════════════════════════
//  CONVERSATION FLOW
// ══════════════════════════════════════════════════════
const STEPS = [
  { key: 'tipo', question: null }, // handled by welcome
  { key: 'estilo' },
  { key: 'colores' },
  { key: 'acabado' },
  { key: 'puertas' },
  { key: 'cajones' },
  { key: 'herrajes' },
  { key: 'medidas' },
  { key: 'distribucion' },
  { key: 'notas' },
  { key: 'complete' }
];

const FURNITURE_TYPES = [
  { id: 'armario', label: '🚪 Armario / Clóset' },
  { id: 'cocina', label: '🍳 Cocina integral' },
  { id: 'bano', label: '🪥 Mueble de baño' },
  { id: 'entretenimiento', label: '📺 Centro de entretenimiento' },
  { id: 'escritorio', label: '💻 Escritorio' },
  { id: 'otro', label: '✦ Otro mueble' },
];

const STYLES = ['Moderno','Minimalista','Clásico','Industrial','Nórdico','Rústico','Loft'];
const ACABADOS = ['Laminado mate','Laminado brillante','Madera natural','Lacado mate','Lacado brillante','Melamina'];
const DOOR_TYPES = ['Correderas','Abatibles','Sin puertas','Plegables','Mixto'];
const HERRAJES_TYPES = ['Dorado','Plateado','Negro mate','Cromo','Sin herrajes visibles'];

// ══════════════════════════════════════════════════════
//  CHAT RENDERING
// ══════════════════════════════════════════════════════
function addMessage(role, content, options = null, dimForm = false) {
  const container = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '✦' : '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role === 'ai' ? 'CR Design IA' : 'Tú';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>');

  body.appendChild(name);
  body.appendChild(bubble);

  if (options && options.length > 0) {
    const row = document.createElement('div');
    row.className = 'options-row';
    options.forEach(opt => {
      const chip = document.createElement('button');
      chip.className = 'opt-chip';
      chip.textContent = typeof opt === 'object' ? opt.label : opt;
      chip.onclick = () => {
        document.querySelectorAll('.opt-chip').forEach(c => c.disabled = true);
        chip.classList.add('selected');
        const val = typeof opt === 'object' ? opt.id : opt;
        handleOptionSelect(val, typeof opt === 'object' ? opt.label : opt);
      };
      row.appendChild(chip);
    });
    body.appendChild(row);
  }

  if (dimForm) {
    body.appendChild(createDimForm());
  }

  wrap.appendChild(avatar);
  wrap.appendChild(body);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function createDimForm() {
  const form = document.createElement('div');
  form.className = 'dim-form';
  form.innerHTML = `
    <div class="dim-title">📐 Ingresa las medidas del espacio</div>
    <div class="dim-grid">
      <div class="dim-field">
        <label>Alto</label>
        <input type="number" id="dimAlto" placeholder="220" min="50" max="350">
        <div class="unit">cm</div>
      </div>
      <div class="dim-field">
        <label>Ancho</label>
        <input type="number" id="dimAncho" placeholder="200" min="30" max="600">
        <div class="unit">cm</div>
      </div>
      <div class="dim-field">
        <label>Fondo / Prof.</label>
        <input type="number" id="dimFondo" placeholder="60" min="20" max="120">
        <div class="unit">cm</div>
      </div>
    </div>
    <button class="dim-confirm" onclick="confirmMedidas()">Confirmar medidas →</button>
  `;
  return form;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-avatar">✦</div><div class="msg-body"><div class="msg-name" style="color:var(--gold)">CR Design IA</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function aiReply(msg, options = null, dimForm = false, delay = 1000) {
  isTyping = true;
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMessage('ai', msg, options, dimForm);
    isTyping = false;
  }, delay);
}

// ══════════════════════════════════════════════════════
//  FLOW LOGIC
// ══════════════════════════════════════════════════════
function handleOptionSelect(val, label) {
  addMessage('user', label);
  const step = project.step;

  if (step === 0) {
    project.tipo = val;
    project.step = 1;
    updateProgress();
    aiReply(`Excelente elección. Un **${label}** requiere atención especial al estilo.\n\n¿Qué estilo deseas para tu mueble?`, STYLES, false, 800);

  } else if (step === 1) {
    project.estilo = val;
    project.step = 2;
    updateProgress();
    aiReply(`Perfecto, estilo **${val}**. Ahora hablemos de colores.\n\n¿Qué combinación de colores prefieres?`, ['Blanco + madera natural','Gris + negro','Madera oscura + negro','Blanco puro','Colores personalizados'], false, 900);

  } else if (step === 2) {
    project.colores = val;
    project.step = 3;
    updateProgress();
    aiReply(`¡Combinación muy elegante! ¿Qué tipo de acabado prefieres para las superficies?`, ACABADOS, false, 800);

  } else if (step === 3) {
    project.acabado = val;
    project.step = 4;
    updateProgress();
    aiReply(`Acabado **${val}** anotado. ¿Qué tipo de puertas deseas?`, DOOR_TYPES, false, 800);

  } else if (step === 4) {
    project.puertas = val;
    project.step = 5;
    updateProgress();
    aiReply(`Puertas **${val}** registradas. ¿Cuántos cajones necesitas aproximadamente?`, ['Sin cajones','1-2 cajones','3-4 cajones','5-6 cajones','Más de 6'], false, 800);

  } else if (step === 5) {
    project.cajones = val;
    project.step = 6;
    updateProgress();
    aiReply(`Perfecto. ¿Qué tipo de herrajes prefieres para tiradores y bisagras?`, HERRAJES_TYPES, false, 800);

  } else if (step === 6) {
    project.herrajes = val;
    project.step = 7;
    updateProgress();
    aiReply(`Herrajes **${val}** confirmados. Ahora necesito las medidas exactas del espacio disponible.\n\nCompleta el formulario a continuación:`, null, true, 900);
  }
}

function confirmMedidas() {
  const alto = document.getElementById('dimAlto')?.value;
  const ancho = document.getElementById('dimAncho')?.value;
  const fondo = document.getElementById('dimFondo')?.value;
  if (!alto || !ancho || !fondo) { alert('Por favor completa las tres medidas.'); return; }
  project.alto = parseFloat(alto);
  project.ancho = parseFloat(ancho);
  project.fondo = parseFloat(fondo);
  project.step = 8;
  document.querySelectorAll('.dim-confirm').forEach(b => b.disabled = true);
  addMessage('user', `Medidas: Alto ${alto}cm × Ancho ${ancho}cm × Fondo ${fondo}cm`);
  updateProgress();
  aiReply(`Medidas registradas. ¿Cómo quieres distribuir el interior?\n\nPuedes combinar varias opciones:`, ['Barra colgadora','Estantes fijos','Cajones','Zapatero','Espejo interior','LED interior','Pantalonero','Joyero'], false, 900);
}

function handleDistribution(val) {
  project.distribucion = project.distribucion ? project.distribucion + ', ' + val : val;
  project.step = 9;
  updateProgress();
  aiReply(`Distribución anotada: **${project.distribucion}**.\n\n¿Tienes alguna necesidad especial o imagen de referencia que quieras compartir?\n\n*(Puedes escribir detalles o adjuntar una imagen con el botón 📎)*`, null, false, 900);
}

function handleFreeText(text) {
  if (project.step === 8) {
    // distribution text
    project.distribucion = text;
    project.step = 9;
    updateProgress();
    aiReply(`Distribución anotada. ¿Tienes alguna necesidad especial o imagen de referencia?\n\n*(Puedes escribir o adjuntar imagen con el botón 📎)*`, null, false, 900);
  } else if (project.step === 9) {
    project.notas = text;
    project.step = 10;
    project.complete = true;
    updateProgress();
    setTimeout(() => generateSummary(), 500);
  } else {
    // Generic chat — call AI
    callClaudeAPI(text);
  }
}

// ══════════════════════════════════════════════════════
//  CLAUDE API
// ══════════════════════════════════════════════════════
async function callClaudeAPI(userMessage) {
  isTyping = true;
  showTyping();
  document.getElementById('sendBtn').disabled = true;

  const systemPrompt = `Eres el asistente de diseño de muebles de CR Design Muebles, una empresa premium de muebles a medida en Colombia. 
El cliente está diseñando: ${project.tipo ? 'un ' + project.tipo : 'un mueble'}.
Datos del proyecto hasta ahora: ${JSON.stringify(project)}.
Responde en español, de manera profesional y cálida. Máximo 3 párrafos cortos. 
Si el cliente hace preguntas técnicas sobre materiales, proporciona información útil sobre aglomerado de 15mm, MDF, y acabados.`;

  conversationHistory.push({ role: 'user', content: userMessage });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Entendido. ¿En qué más puedo ayudarte con tu proyecto?';
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('ai', reply);
  } catch (e) {
    removeTyping();
    addMessage('ai', 'Entendido. ¿Hay algo más que quieras ajustar en tu diseño?');
  }
  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

// ══════════════════════════════════════════════════════
//  SEND USER MESSAGE
// ══════════════════════════════════════════════════════
function sendUserMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  if (project.step >= 8 && project.step <= 9) {
    handleFreeText(text);
  } else {
    callClaudeAPI(text);
  }
}

// ══════════════════════════════════════════════════════
//  TECHNICAL CALCULATION — 15mm AGLOMERADO
// ══════════════════════════════════════════════════════
function calcDespiece() {
  if (!project.alto || !project.ancho || !project.fondo) return null;
  const T = 1.5; // 15mm in cm
  const H = project.alto, W = project.ancho, D = project.fondo;
  const cols = Math.max(1, Math.round(W / 65));
  const colW = (W - T * (cols + 1)) / cols;

  const pieces = [];

  // Carcasa
  pieces.push({ nombre: 'Lateral izquierdo', cant: 1, ancho: D, largo: H, esp: '15mm', mat: 'Aglomerado' });
  pieces.push({ nombre: 'Lateral derecho',   cant: 1, ancho: D, largo: H, esp: '15mm', mat: 'Aglomerado' });
  pieces.push({ nombre: 'Techo',             cant: 1, ancho: D, largo: W - 2*T, esp: '15mm', mat: 'Aglomerado' });
  pieces.push({ nombre: 'Suelo',             cant: 1, ancho: D, largo: W - 2*T, esp: '15mm', mat: 'Aglomerado' });
  pieces.push({ nombre: 'Fondo (espaldar)',  cant: 1, ancho: H, largo: W, esp: '8mm',  mat: 'MDF delgado' });

  // Divisiones verticales
  if (cols > 1) pieces.push({ nombre: 'División vertical', cant: cols - 1, ancho: D - T, largo: H - 2*T, esp: '15mm', mat: 'Aglomerado' });

  // Estantes
  const shelvesPerCol = Math.floor((H - 60) / 35);
  pieces.push({ nombre: 'Estante interior', cant: cols * shelvesPerCol, ancho: D - T, largo: colW, esp: '15mm', mat: 'Aglomerado' });

  // Puertas
  if (project.puertas && project.puertas !== 'Sin puertas') {
    const doorW = W / (cols * 2);
    const doorH = H - 1;
    pieces.push({ nombre: 'Puerta', cant: cols * 2, ancho: doorW, largo: doorH, esp: '18mm', mat: 'Aglomerado' });
  }

  // Cajones
  const numCajones = project.cajones === 'Sin cajones' ? 0 :
    project.cajones === '1-2 cajones' ? 2 :
    project.cajones === '3-4 cajones' ? 3 :
    project.cajones === '5-6 cajones' ? 5 : 2;

  if (numCajones > 0) {
    const cajonH = 18;
    const cajonW = colW - 2;
    pieces.push({ nombre: 'Frente de cajón',     cant: numCajones, ancho: cajonW + 2, largo: cajonH + 2, esp: '18mm', mat: 'Aglomerado' });
    pieces.push({ nombre: 'Lateral cajón (x2)',  cant: numCajones * 2, ancho: D - 5, largo: cajonH - 2, esp: '15mm', mat: 'Aglomerado' });
    pieces.push({ nombre: 'Fondo cajón',         cant: numCajones, ancho: cajonW - 2, largo: D - 5, esp: '8mm', mat: 'MDF' });
  }

  return pieces;
}

function calcHerrajes() {
  if (!project.ancho || !project.alto) return [];
  const cols = Math.max(1, Math.round(project.ancho / 65));
  const shelvesPerCol = Math.floor((project.alto - 60) / 35);
  const hasDoors = project.puertas && project.puertas !== 'Sin puertas';
  const numDoors = hasDoors ? cols * 2 : 0;
  const numCajones = project.cajones === 'Sin cajones' ? 0 :
    project.cajones === '1-2 cajones' ? 2 :
    project.cajones === '3-4 cajones' ? 3 :
    project.cajones === '5-6 cajones' ? 5 : 2;

  const items = [];
  if (numDoors > 0) {
    if (project.puertas === 'Correderas') {
      items.push({ nombre: 'Kit correderas para puertas', qty: `${Math.ceil(numDoors/2)} kit` });
    } else {
      items.push({ nombre: `Bisagras ${project.herrajes || 'estándar'}`, qty: `${numDoors * 2} uds` });
      items.push({ nombre: `Tiradores ${project.herrajes || 'dorados'}`, qty: `${numDoors} uds` });
    }
    items.push({ nombre: 'Amortiguadores de puerta', qty: `${numDoors * 2} uds` });
  }
  items.push({ nombre: 'Clavijas/tarugos de ensamble', qty: `${cols * 20} uds` });
  items.push({ nombre: 'Tornillos confirmat 7×50mm', qty: `${cols * 16} uds` });
  items.push({ nombre: 'Tornillos 3.5×16mm', qty: `${cols * 30} uds` });
  items.push({ nombre: 'Tapacanto ABS 1mm', qty: `${Math.ceil((project.alto + project.ancho) * 4 / 100)} ml` });
  items.push({ nombre: 'Soportes de estante regulables', qty: `${cols * shelvesPerCol * 4} uds` });
  if (numCajones > 0) {
    items.push({ nombre: 'Correderas telescópicas 45cm', qty: `${numCajones} pares` });
    items.push({ nombre: `Tiradores cajón ${project.herrajes || 'dorados'}`, qty: `${numCajones} uds` });
  }
  if (project.distribucion?.includes('Barra')) {
    const cols2 = Math.max(1, Math.round(project.ancho / 65));
    items.push({ nombre: 'Barra colgar Ø25mm cromada', qty: `${cols2} × ${Math.round(project.ancho / cols2 - 4)}cm` });
    items.push({ nombre: 'Soporte para barra colgadora', qty: `${cols2 * 2} uds` });
  }
  if (project.distribucion?.includes('LED')) items.push({ nombre: 'Tira LED 12V cálida', qty: `${Math.ceil(project.ancho * 3 / 100)} ml` });

  return items;
}

function calcTableros() {
  if (!project.alto || !project.ancho || !project.fondo) return null;
  const pieces = calcDespiece();
  if (!pieces) return null;
  const tablerosArea = 244 * 122; // cm² por tablero estándar
  let totalArea = 0;
  pieces.forEach(p => {
    if (p.esp !== '8mm') totalArea += p.ancho * p.largo * p.cant;
  });
  return { tableros: Math.ceil(totalArea / tablerosArea * 1.12), area: Math.round(totalArea) };
}

// ══════════════════════════════════════════════════════
//  GENERATE SUMMARY
// ══════════════════════════════════════════════════════
function generateSummary() {
  isTyping = true;
  showTyping();
  setTimeout(() => {
    removeTyping();
    const pieces = calcDespiece();
    const herrajes = calcHerrajes();
    const tableros = calcTableros();
    const cols = project.ancho ? Math.max(1, Math.round(project.ancho / 65)) : '—';

    addMessage('ai',
      `✅ **Proyecto completo.** He procesado todos los datos de tu ${project.tipo || 'mueble'}.\n\n` +
      `📐 **Dimensiones:** ${project.ancho}×${project.alto}×${project.fondo} cm\n` +
      `🔲 **Columnas:** ${cols} módulo(s)\n` +
      `📋 **Piezas calculadas:** ${pieces?.length || 0} elementos (15mm aglomerado)\n` +
      `📦 **Tableros estimados:** ${tableros?.tableros || '—'} tableros 244×122cm\n\n` +
      `El despiece técnico completo, los herrajes y los materiales ya están disponibles en el panel derecho. Puedes enviarme el proyecto completo con el botón de abajo.`
    );

    updateRightPanel();
    document.getElementById('sendProjectBtn').disabled = false;
    isTyping = false;
  }, 1800);
}

  el.classList.add('active');
  updateRightPanel();
}

      </div>
    `;
  }
}

function getProgress() {
  const keys = ['tipo','estilo','colores','acabado','puertas','cajones','herrajes','alto','distribucion'];
  const filled = keys.filter(k => project[k] !== null).length;
  return Math.round((filled / keys.length) * 100);
}

function updateProgress() {
  if (project.step >= 7) updateRightPanel();
  else {
    const content = document.getElementById('rpContent');
    const p = getProgress();
    const bar = content.querySelector('.progress-fill');
    if (bar) bar.style.width = p + '%';
  }
  updateRightPanel();
}

MEDIDAS
━━━━━━━━━━━━━━━━━━━━━━

function sendEmail() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const city = document.getElementById('cCity').value.trim();
  const notes = document.getElementById('cNotes').value.trim();
  if (!name || !phone) { alert('Nombre y teléfono son obligatorios.'); return; }
  const body = buildEmailBody(name, phone, email, city, notes);
  const subject = encodeURIComponent(`Proyecto CR Design IA — ${project.tipo || 'Mueble'} — ${name}`);
  window.location.href = `mailto:miguel_716@hotmail.com?subject=${subject}&body=${encodeURIComponent(body)}`;
  closeModal();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// File upload
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const container = document.getElementById('chatMessages');
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-body"><div class="msg-name">Tú</div><div class="msg-bubble">Imagen de referencia adjuntada<br><img src="${ev.target.result}" class="img-preview" alt="Referencia"></div></div>`;
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    aiReply('¡Gracias por la imagen de referencia! La tendré en cuenta para el diseño. ¿Hay algún detalle específico de esta imagen que quieras replicar?', null, false, 1000);
  };
  reader.readAsDataURL(file);
});
